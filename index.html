<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>
</head>

<body>

<h1> My To-Do List</h1>

<form action="/add" method="POST">
    <input type="text" name="task" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<h2>Tasks:</h2>

<ul>
{% for task in tasks %}
    <li>
        {{ task }}
        <a href="/delete/{{ loop.index0 }}">Delete</a>
    </li>
{% endfor %}
</ul>

</body>
</html>

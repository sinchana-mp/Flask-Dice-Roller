<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>

<body>

<h1>Contact Me</h1>

<form action="/submit" method="POST">

    Name:
    <input type="text" name="name">
    <br><br>

    Email:
    <input type="email" name="email">
    <br><br>

    Message:
    <textarea name="message"></textarea>
    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
